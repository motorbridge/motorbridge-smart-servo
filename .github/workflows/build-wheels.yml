name: Build Python Wheels

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Wheel ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
          - name: linux-x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - name: linux-aarch64
            os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
          - name: macos-aarch64
            os: macos-14
            target: aarch64-apple-darwin

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: wheel-${{ matrix.name }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build wheel with maturin
        uses: PyO3/maturin-action@v1
        with:
          working-directory: bindings/python
          target: ${{ matrix.target }}
          args: --release --out dist
          manylinux: "2014"
          sccache: "true"
      - name: Fix Linux wheel artifact ownership
        if: runner.os == 'Linux'
        run: sudo chown -R "$USER:$USER" bindings/python/dist
      - name: Check wheel metadata
        run: |
          python -m pip install --upgrade pip twine
          python -m twine check bindings/python/dist/*
      - name: Generate wheel checksums
        shell: bash
        env:
          MATRIX_NAME: ${{ matrix.name }}
        run: |
          python -c 'import hashlib, os, pathlib; dist=pathlib.Path("bindings/python/dist"); wheels=sorted(dist.glob("*.whl")); assert wheels, "no wheels found"; out=dist / ("SHA256SUMS-" + os.environ["MATRIX_NAME"] + ".txt"); out.write_text("".join(hashlib.sha256(w.read_bytes()).hexdigest() + "  " + w.name + "\n" for w in wheels), encoding="utf-8")'
      - uses: actions/upload-artifact@v4
        with:
          name: motorbridge-smart-servo-wheel-${{ matrix.name }}
          path: |
            bindings/python/dist/*.whl
            bindings/python/dist/SHA256SUMS-${{ matrix.name }}.txt

  test:
    name: Test wheel / Python ${{ matrix.python-version }} / ${{ matrix.os }}
    needs: build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-14]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true
      - name: Download wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: motorbridge-smart-servo-wheel-*
          path: wheelhouse
          merge-multiple: true
      - name: Install wheel
        run: python -m pip install --find-links wheelhouse motorbridge-smart-servo
      - name: Import smoke
        run: python -c "from motorbridge_smart_servo import FashionStarServo, AngleSample, SmartServoBus; print(AngleSample)"
      - name: CLI smoke
        run: python -m motorbridge_smart_servo.cli --help

  publish:
    name: Publish to GitHub Release
    needs: [build, test]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: motorbridge-smart-servo-wheel-*
          path: dist
          merge-multiple: true
      - name: Upload wheels to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: |
            MotorBridge Smart Servo v0.0.2

            Highlights:
            - Migrates Python bindings from ctypes to PyO3 + maturin abi3 wheels.
            - Keeps the stable Python API while compiling the Rust core directly into the Python extension module.
            - Ships native CLI/ABI artifacts, Python wheels, and WASM package through GitHub Actions.
            - Preserves A->0->B angle glitch suppression and timeout-safe monitoring.

            Full Changelog: https://github.com/motorbridge/motorbridge-smart-servo/compare/v0.0.1...v0.0.2
          make_latest: true
          files: |
            dist/*.whl
            dist/SHA256SUMS-*.txt
          fail_on_unmatched_files: true
          overwrite_files: true
