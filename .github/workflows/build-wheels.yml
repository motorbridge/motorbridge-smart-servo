name: Build Python Wheels

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Wheel ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
          - name: linux-x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - name: linux-aarch64
            os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
          - name: macos-x86_64
            os: macos-13
            target: x86_64-apple-darwin
          - name: macos-aarch64
            os: macos-14
            target: aarch64-apple-darwin

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: wheel-${{ matrix.name }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build wheel with maturin
        uses: PyO3/maturin-action@v1
        with:
          working-directory: bindings/python
          target: ${{ matrix.target }}
          args: --release --out dist
          manylinux: "2014"
          sccache: "true"
      - name: Check wheel metadata
        run: |
          python -m pip install --upgrade pip twine
          python -m twine check bindings/python/dist/*
      - name: Generate wheel checksums
        shell: bash
        run: |
          cd bindings/python/dist
          sha256sum *.whl > SHA256SUMS-${{ matrix.name }}.txt
      - uses: actions/upload-artifact@v4
        with:
          name: motorbridge-smart-servo-wheel-${{ matrix.name }}
          path: |
            bindings/python/dist/*.whl
            bindings/python/dist/SHA256SUMS-${{ matrix.name }}.txt

  test:
    name: Test wheel / Python ${{ matrix.python-version }} / ${{ matrix.os }}
    needs: build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true
      - name: Download wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: motorbridge-smart-servo-wheel-*
          path: wheelhouse
          merge-multiple: true
      - name: Install wheel
        run: python -m pip install --find-links wheelhouse motorbridge-smart-servo
      - name: Import smoke
        run: python -c "from motorbridge_smart_servo import FashionStarServo, AngleSample, SmartServoBus; print(AngleSample)"
      - name: CLI smoke
        run: python -m motorbridge_smart_servo.cli --help

  publish:
    name: Publish to GitHub Release
    needs: [build, test]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: motorbridge-smart-servo-wheel-*
          path: dist
          merge-multiple: true
      - name: Upload wheels to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.whl
            dist/SHA256SUMS-*.txt
          fail_on_unmatched_files: true
          generate_release_notes: true
