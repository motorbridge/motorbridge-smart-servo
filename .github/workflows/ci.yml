name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  rust:
    name: Rust ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install Linux native deps
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y pkg-config libudev-dev
      - name: Format
        run: cargo fmt --all -- --check
      - name: Check
        run: cargo check --workspace
      - name: Test
        run: cargo test --workspace

  python:
    name: Python binding smoke ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: Swatinem/rust-cache@v2
      - name: Install Linux native deps
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y pkg-config libudev-dev
      - name: Build ABI
        run: cargo build -p smart_servo_abi
      - name: Python import smoke
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e bindings/python
          python -m compileall bindings/python/src examples
          python -m motorbridge_smart_servo.cli --help

  wasm:
    name: WASM core
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Check WASM reliability core
        run: cargo check -p smart_servo_wasm --target wasm32-unknown-unknown
