<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>MotorBridge — Multi-Servo Monitor</title>
        <style>
            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }
            body {
                background: #0d1117;
                color: #e6edf3;
                font-family: ui-monospace, monospace;
                font-size: 13px;
            }
            header {
                padding: 14px 20px;
                border-bottom: 1px solid #21262d;
                display: flex;
                align-items: center;
                gap: 16px;
            }
            header h1 {
                font-size: 15px;
                font-weight: 600;
                letter-spacing: 0.03em;
            }
            header .tag {
                background: #1f6feb;
                color: #fff;
                border-radius: 4px;
                padding: 2px 7px;
                font-size: 11px;
            }
            .toolbar {
                display: flex;
                align-items: center;
                gap: 10px;
                padding: 10px 20px;
                border-bottom: 1px solid #21262d;
                flex-wrap: wrap;
            }
            .toolbar label {
                display: flex;
                align-items: center;
                gap: 6px;
                color: #8b949e;
            }
            .toolbar input[type="text"],
            .toolbar input[type="number"] {
                background: #161b22;
                border: 1px solid #30363d;
                color: #e6edf3;
                border-radius: 4px;
                padding: 4px 8px;
                width: 120px;
                font-family: inherit;
                font-size: 12px;
            }
            .toolbar input[type="checkbox"] {
                accent-color: #1f6feb;
            }
            button {
                background: #21262d;
                border: 1px solid #30363d;
                color: #e6edf3;
                border-radius: 6px;
                padding: 5px 14px;
                cursor: pointer;
                font-family: inherit;
                font-size: 12px;
            }
            button:hover:not(:disabled) {
                background: #30363d;
            }
            button:disabled {
                opacity: 0.4;
                cursor: default;
            }
            button.primary {
                background: #1f6feb;
                border-color: #1f6feb;
            }
            button.primary:hover:not(:disabled) {
                background: #388bfd;
            }
            #status {
                color: #8b949e;
                font-size: 12px;
                margin-left: auto;
            }
            .main {
                display: grid;
                grid-template-columns: 1fr 220px;
                gap: 0;
                height: calc(100vh - 90px);
            }
            #chart {
                display: block;
                width: 100%;
                height: 100%;
            }
            .sidebar {
                border-left: 1px solid #21262d;
                padding: 12px;
                overflow-y: auto;
                display: flex;
                flex-direction: column;
                gap: 8px;
            }
            .servo-card {
                border: 1px solid #21262d;
                border-radius: 6px;
                padding: 8px 10px;
            }
            .servo-card.reliable {
                border-left: 3px solid var(--color);
            }
            .servo-card.unreliable {
                border-left: 3px solid #444;
            }
            .servo-card .header {
                display: flex;
                align-items: center;
                gap: 6px;
                margin-bottom: 4px;
            }
            .servo-card .dot {
                width: 8px;
                height: 8px;
                border-radius: 50%;
                background: var(--color);
                flex-shrink: 0;
            }
            .servo-card .id {
                font-weight: 600;
            }
            .servo-card .angle {
                font-size: 18px;
                font-weight: 700;
                font-variant-numeric: tabular-nums;
            }
            .servo-card .meta {
                color: #8b949e;
                font-size: 11px;
                margin-top: 2px;
            }
            .servo-card.no-data .angle {
                color: #444;
            }
        </style>
    </head>
    <body>
        <header>
            <h1>MotorBridge Smart Servo</h1>
            <span class="tag">WASM</span>
            <span style="color: #8b949e; font-size: 12px">Multi-Servo Monitor — sync_monitor (code 25)</span>
        </header>

        <div class="toolbar">
            <label>Port baudrate <input id="baudrate" type="number" value="1000000" /></label>
            <label>IDs (space-sep) <input id="ids" type="text" value="0 1 2 3 4 5 6" style="width: 140px" /></label>
            <label
                >History (s) <input id="history-s" type="number" value="8" min="2" max="60" style="width: 60px"
            /></label>
            <button id="connect" class="primary">Connect WebSerial</button>
            <button id="disconnect" disabled>Disconnect</button>
            <button id="clear">Clear</button>
            <span id="status">idle</span>
        </div>

        <div class="main">
            <canvas id="chart"></canvas>
            <div class="sidebar" id="sidebar"></div>
        </div>

        <script type="module" src="app.js"></script>
    </body>
</html>
